<!doctype html>
<html>
<head>
	<title>Yard Sale - Fix Existing Inequality</title>
	<link href="automatic.css" rel="stylesheet" type="text/css">
</head>
<body>
	<div id="container">
		<div id="main_area">
			<canvas id="canvas" width="600" height="500"></canvas>
		</div>
		<div id="stats">
			<canvas id="stats_canvas" width="400" height="220"></canvas>
			<div id="stats_text"></div>
			<div>
				<div class="btn" id="moving" onclick="START_SIM=!START_SIM; updateButtons()">&#x25B6; play</div>
				<div class="btn" id="reset_btn" onclick="reset()">&#x21BB; reset</div>
				<div class="btn" id="view_toggle" onclick="toggleView()">&#x2630; bars</div>
				<div class="btn" id="sort_toggle" onclick="toggleSort()">&#x2195; fixed</div>
			</div>
			<div class="view-hint">try: &#x2630; bars or &#x2195; sorted to see the distribution differently</div>
			<div id="controls">
				<div class="slider-row">
					<label>Wealth tax:</label>
					<input type="range" id="sl_tax" min="0" max="10" value="0" step="0.1" oninput="updateTax()">
					<input class="val" id="val_tax" value="0%" onchange="typedTax()" onkeydown="if(event.key==='Enter')this.blur()">
				</div>
			</div>
			<div id="info_text" style="margin-top:12px">
				The world <b style="color:#ddd">starts</b> with extreme inequality.<br>
				Can a wealth tax fix it, even after the damage is done?
			</div>
		</div>
	</div>
</body>
</html>

<script>
window.SIM_CONFIG = { numPeople: 50, wealthTax: 0, startingInequality: 90 };
</script>
<script src="../lib/Mouse.js"></script>
<script src="automatic.js"></script>
<script>
SPEED = 300;

function fmtNum(n) {
	if (n === Math.floor(n)) return n.toFixed(0);
	var s = n.toFixed(4);
	return s.replace(/0+$/, "").replace(/\.$/, "");
}

function updateTax() {
	WEALTH_TAX = parseFloat(document.getElementById("sl_tax").value) / 100;
	document.getElementById("val_tax").value = fmtNum(WEALTH_TAX * 100) + "%";
}

function typedTax() {
	var num = parseFloat(document.getElementById("val_tax").value);
	if (isNaN(num)) { updateTax(); return; }
	num = Math.max(0, Math.min(10, num));
	WEALTH_TAX = num / 100;
	document.getElementById("sl_tax").value = num;
	document.getElementById("val_tax").value = fmtNum(num) + "%";
}
</script>
