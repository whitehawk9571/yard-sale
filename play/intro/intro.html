<!doctype html>
<html>
<head>
	<style>
	body{
		margin:0;
		font-family: sans-serif;
		font-weight: 100;
		overflow: hidden;
	}
	#intro{
		width:1280px; height:550px; background:#111; position:relative; overflow:hidden;
	}
	#intro_text{
		color: #ddd;
		text-align: center;
		width: 100%;
		position: absolute;
		top: 140px;
		z-index: 10;
		pointer-events: none;
	}
	#intro_title{
		font-size: 60px;
		font-weight: bold;
		letter-spacing: 4px;
		color: #eee;
		text-shadow: 0 2px 20px rgba(0,0,0,0.8);
	}
	#intro_subtitle{
		font-size: 22px;
		color: #999;
		margin-top: 12px;
		letter-spacing: 1px;
		text-shadow: 0 1px 10px rgba(0,0,0,0.8);
	}
	/* Gradient vignette overlay */
	#intro_vignette{
		position: absolute;
		top: 0; left: 0;
		width: 100%; height: 100%;
		background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
		pointer-events: none;
		z-index: 5;
	}
	</style>
</head>
<body>
	<div id="intro">
		<canvas id="canvas" width="1280" height="550" style="position:absolute;top:0;left:0"></canvas>
		<div id="intro_vignette"></div>
		<div id="intro_text">
			<div id="intro_title">THE FOLLY OF FAIRNESS</div>
			<div id="intro_subtitle">a playable post on how fair trades make an unfair world</div>
		</div>
	</div>
</body>
</html>
<script src="intro.js"></script>
